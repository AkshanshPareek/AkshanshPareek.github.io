<!DOCTYPE HTML>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Art | Akshansh Pareek</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="logo.png">

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap");
    @import url("https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,400;0,700;1,400;1,700&display=swap");

    body {
      font-family: "Lato", Verdana, Helvetica, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      color: #f3f3f3;
      margin: 0;
      background: #111;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      background-image: url("background..png");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background: rgba(0, 0, 0, 0.5);
    }

    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 36px 24px 70px;
    }

    a {
      color: #8fd0ef;
      text-decoration: none;
    }

    a:hover {
      color: #c7eeff;
      text-decoration: underline;
    }

    .back {
      font-family: "Inter", sans-serif;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.8);
    }

    h1 {
      font-family: "Inter", sans-serif;
      font-size: 36px;
      font-weight: 350;
      letter-spacing: 0.7px;
      margin: 24px 0 8px;
      color: #fff;
    }

    p {
      color: rgba(255, 255, 255, 0.82);
      font-size: 15px;
      margin: 0 0 22px;
    }

    .videos {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    iframe {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 0;
      border-radius: 6px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    @media (max-width: 768px) {
      main {
        padding: 24px 16px 60px;
      }

      .videos {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 28px;
      }
    }
  </style>
</head>

<body>
  <main>
    <a class="back" href="index.html">&larr; Back</a>
    <h1>Art</h1>
    <p>3D cinematography, game environments, visual experiments, and short animation work.</p>

    <div class="videos">
      <iframe src="https://www.youtube.com/embed/yM8Uyrlwob0" title="3D art showreel 1" allowfullscreen></iframe>
      <iframe src="https://www.youtube.com/embed/K_jZJiNf6UE" title="3D art showreel 2" allowfullscreen></iframe>
      <iframe src="https://www.youtube.com/embed/WdmP4ilvCjs" title="3D art showreel 3" allowfullscreen></iframe>
      <iframe src="https://www.youtube.com/embed/28UecXn1wNI" title="3D art showreel 4" allowfullscreen></iframe>
      <iframe src="https://www.youtube.com/embed/QoXlHWZktUU" title="3D art showreel 5" allowfullscreen></iframe>
      <iframe src="https://www.youtube.com/embed/Px0NTvYg-rI" title="3D art showreel 6" allowfullscreen></iframe>
    </div>
  </main>
</body>
</html>
