<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akshansh Pareek | Projects</title>
  <style>
    :root {
      --ink: #111827;
      --muted: #4b5563;
      --soft: #7b8491;
      --line: rgba(17, 24, 39, 0.12);
      --link: #1d4ed8;
      --ok: #087f5b;
      --bad: #c92a2a;
      --warn: #9a6700;
      --panel: rgba(255, 255, 255, 0.78);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.55;
      background: #f4f6f2;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      background-image: url("background..png");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      opacity: 0.58;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background: rgba(248, 250, 252, 0.76);
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 42px 0 76px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 30px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(36px, 6vw, 62px);
      line-height: 0.98;
      letter-spacing: -0.05em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      max-width: 680px;
      font-size: 16px;
    }

    button {
      border: 0;
      border-radius: 999px;
      background: #111827;
      color: white;
      padding: 11px 16px;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover { background: #1f2937; }

    .summary {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 22px;
    }

    .project {
      background: var(--panel);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 16px 42px rgba(17, 24, 39, 0.08);
      backdrop-filter: blur(10px);
    }

    .thumb {
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      display: block;
      background: rgba(17, 24, 39, 0.08);
    }

    .body { padding: 18px 18px 20px; }

    .meta {
      margin-bottom: 8px;
      color: var(--soft);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    h2 {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.25;
      letter-spacing: -0.015em;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .links {
      display: grid;
      gap: 8px;
      margin-top: 15px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .link-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 14px;
    }

    a {
      color: var(--link);
      text-decoration: none;
      font-weight: 650;
    }

    a:hover {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .status {
      flex: 0 0 auto;
      border-radius: 999px;
      padding: 3px 8px;
      background: rgba(17, 24, 39, 0.07);
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .status.ok { background: rgba(8, 127, 91, 0.12); color: var(--ok); }
    .status.bad { background: rgba(201, 42, 42, 0.12); color: var(--bad); }
    .status.external { background: rgba(154, 103, 0, 0.12); color: var(--warn); }

    @media (max-width: 920px) {
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 640px) {
      main {
        width: min(100% - 24px, 1120px);
        padding-top: 28px;
      }

      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Projects</h1>
        <p class="subtitle">A quick project-card page where View Project opens a webpage first, and the original PDFs, reports, demos, and videos stay as resources.</p>
      </div>
      <button type="button" onclick="checkAllLinks()">Check links</button>
    </header>

    <p class="summary" id="summary">Run this from the repo root through a local server or GitHub Pages, then click Check links.</p>
    <section class="grid" id="projects" aria-label="Project cards"></section>
  </main>

  <script src="projects.js"></script>
  <script>
    const projectsEl = document.getElementById("projects");
    const summaryEl = document.getElementById("summary");

    function esc(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function url(path) {
      return new URL(path, document.baseURI).href;
    }

    function isExternal(href) {
      return /^https?:\/\//i.test(href) && new URL(href).origin !== location.origin;
    }

    function renderProjects() {
      projectsEl.innerHTML = PROJECTS.map((project, index) => {
        const projectPage = `project.html?id=${encodeURIComponent(project.id)}`;
        const resources = [
          { label: "View project", href: projectPage, type: "page" },
          ...project.resources
        ];

        const links = resources.map((resource, linkIndex) => {
          const href = /^https?:\/\//i.test(resource.href) ? resource.href : url(resource.href);
          return `
            <div class="link-row">
              <a href="${esc(href)}" target="_blank" rel="noopener" data-href="${esc(resource.href)}">${esc(resource.label)}</a>
              <span class="status" id="status-${index}-${linkIndex}">idle</span>
            </div>
          `;
        }).join("");

        return `
          <article class="project">
            <img class="thumb" src="${esc(url(project.image))}" alt="${esc(project.title)} project card">
            <div class="body">
              <div class="meta">${esc(project.year)}</div>
              <h2>${esc(project.title)}</h2>
              <p>${esc(project.description)}</p>
              <div class="links">${links}</div>
            </div>
          </article>
        `;
      }).join("");
    }

    async function checkLocalFile(href) {
      try {
        const response = await fetch(url(href), { method: "HEAD", cache: "no-store" });
        if (response.ok) return true;
      } catch (error) {
      }

      try {
        const response = await fetch(url(href), { method: "GET", cache: "no-store" });
        return response.ok;
      } catch (error) {
        return false;
      }
    }

    async function checkAllLinks() {
      if (location.protocol === "file:") {
        summaryEl.textContent = "Use a local server instead of opening the HTML directly, otherwise the browser cannot reliably check file links.";
        return;
      }

      const anchors = [...document.querySelectorAll("a[data-href]")];
      let ok = 0;
      let bad = 0;
      let external = 0;

      await Promise.all(anchors.map(async (anchor) => {
        const href = anchor.dataset.href;
        const status = anchor.parentElement.querySelector(".status");
        status.className = "status";
        status.textContent = "checking";

        if (isExternal(href)) {
          status.classList.add("external");
          status.textContent = "external";
          external += 1;
          return;
        }

        const works = await checkLocalFile(href);
        if (works) {
          status.classList.add("ok");
          status.textContent = "working";
          ok += 1;
        } else {
          status.classList.add("bad");
          status.textContent = "missing";
          bad += 1;
        }
      }));

      summaryEl.textContent = `${ok} local links working, ${bad} missing, ${external} external links not checked by browser.`;
    }

    renderProjects();
  </script>
</body>
</html>
