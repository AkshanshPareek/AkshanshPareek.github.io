<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project | Akshansh Pareek</title>
  <style>
    :root {
      --ink: #111827;
      --muted: #4b5563;
      --soft: #7b8491;
      --line: rgba(17, 24, 39, 0.12);
      --link: #1d4ed8;
      --panel: rgba(255, 255, 255, 0.78);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.58;
      background: #f4f6f2;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      background-image: url("background..png");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      opacity: 0.58;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background: rgba(248, 250, 252, 0.76);
    }

    main {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0 76px;
    }

    .back {
      display: inline-block;
      margin-bottom: 26px;
      color: var(--link);
      font-weight: 700;
      text-decoration: none;
    }

    .back:hover { text-decoration: underline; }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 36px;
      align-items: start;
    }

    .meta {
      margin-bottom: 10px;
      color: var(--soft);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(36px, 6vw, 64px);
      line-height: 0.98;
      letter-spacing: -0.055em;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 17px;
      max-width: 700px;
    }

    .thumb {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      border-radius: 22px;
      box-shadow: 0 20px 50px rgba(17, 24, 39, 0.14);
      background: rgba(17, 24, 39, 0.08);
    }

    h2 {
      margin: 58px 0 16px;
      font-size: 22px;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .resource-list {
      display: grid;
      gap: 12px;
      max-width: 720px;
    }

    .resource {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 15px 0;
      border-bottom: 1px solid var(--line);
    }

    .resource:last-child { border-bottom: 0; }

    .resource strong {
      display: block;
      font-size: 16px;
    }

    .resource span {
      color: var(--soft);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 800;
    }

    a {
      color: var(--link);
      text-decoration: none;
      font-weight: 700;
    }

    a:hover {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .missing {
      margin-top: 40px;
      padding: 22px;
      border-radius: 18px;
      background: var(--panel);
      box-shadow: 0 16px 42px rgba(17, 24, 39, 0.08);
    }

    @media (max-width: 820px) {
      main { width: min(100% - 24px, 980px); }

      .hero {
        grid-template-columns: 1fr;
        gap: 24px;
      }

      .thumb {
        max-width: 360px;
        aspect-ratio: 16 / 10;
      }
    }
  </style>
</head>
<body>
  <main>
    <a class="back" href="index.html">&larr; Back to projects</a>
    <div id="project"></div>
  </main>

  <script src="projects.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const project = PROJECTS.find((item) => item.id === params.get("id"));
    const root = document.getElementById("project");

    function esc(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function url(path) {
      return /^https?:\/\//i.test(path) ? path : new URL(path, document.baseURI).href;
    }

    function typeLabel(type) {
      return {
        pdf: "PDF",
        video: "Video",
        external: "External",
        page: "Page"
      }[type] || "Resource";
    }

    if (!project) {
      document.title = "Project not found | Akshansh Pareek";
      root.innerHTML = `
        <div class="missing">
          <h1>Project not found</h1>
          <p>This project link does not match a project in projects.js.</p>
        </div>
      `;
    } else {
      document.title = `${project.title} | Akshansh Pareek`;
      root.innerHTML = `
        <section class="hero">
          <div>
            <div class="meta">${esc(project.year)}</div>
            <h1>${esc(project.title)}</h1>
            <p>${esc(project.description)}</p>
          </div>
          <img class="thumb" src="${esc(url(project.image))}" alt="${esc(project.title)} project card">
        </section>

        <section>
          <h2>Resources</h2>
          <div class="resource-list">
            ${project.resources.map((resource) => `
              <div class="resource">
                <div>
                  <strong>${esc(resource.label)}</strong>
                  <span>${esc(typeLabel(resource.type))}</span>
                </div>
                <a href="${esc(url(resource.href))}" target="_blank" rel="noopener">Open</a>
              </div>
            `).join("")}
          </div>
        </section>
      `;
    }
  </script>
</body>
</html>
